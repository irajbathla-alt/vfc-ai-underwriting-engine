<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #f6f6f6; color: #111; }
      .card { max-width: 820px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
      h1 { margin: 0 0 8px; font-size: 26px; }
      p { color: #555; }
      label { display: block; font-weight: bold; margin-top: 16px; }
      input, button { width: 100%; box-sizing: border-box; padding: 13px; margin-top: 8px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px; }
      button { background: #111; color: #fff; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
      button:disabled { background: #777; }
      .note { font-size: 13px; color: #666; margin-top: 8px; }
      #result { white-space: pre-wrap; background: #f1f1f1; padding: 16px; margin-top: 20px; border-radius: 10px; min-height: 80px; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>VFC AI Admin Upload</h1>
      <p>Upload bank statement PDFs. The system reads the statement dates and creates the period from earliest to latest.</p>

      <label>Company / Individual Name</label>
      <input id="companyName" placeholder="Example: ABC Pizza Ltd">

      <label>Upload Bank Statement PDFs</label>
      <input id="files" type="file" accept="application/pdf" multiple>
      <div class="note">V1 reads bank statements only. Leave tax documents out for now.</div>

      <button id="uploadButton" onclick="uploadStatements()">Upload & Read Bank Statements</button>
      <div id="result">Ready.</div>
    </div>

    <script>
      async function uploadStatements() {
        const companyName = document.getElementById('companyName').value.trim();
        const fileInput = document.getElementById('files');
        const result = document.getElementById('result');
        const button = document.getElementById('uploadButton');

        if (!companyName) {
          alert('Enter company or individual name.');
          return;
        }

        if (!fileInput.files.length) {
          alert('Select at least one PDF bank statement.');
          return;
        }

        button.disabled = true;
        result.innerText = 'Uploading PDFs, reading statements, and creating summary...';

        try {
          const files = [];
          for (const file of fileInput.files) {
            const base64 = await toBase64(file);
            files.push({
              name: file.name,
              mimeType: file.type || 'application/pdf',
              base64: base64.split(',')[1]
            });
          }

          google.script.run
            .withSuccessHandler(function(response) {
              button.disabled = false;
              result.innerText = JSON.stringify(response, null, 2);
            })
            .withFailureHandler(function(error) {
              button.disabled = false;
              result.innerText = 'Error: ' + error.message;
            })
            .uploadStatementBatch(companyName, files);
        } catch (error) {
          button.disabled = false;
          result.innerText = 'Error: ' + error.message;
        }
      }

      function toBase64(file) {
        return new Promise(function(resolve, reject) {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = function() { resolve(reader.result); };
          reader.onerror = function(error) { reject(error); };
        });
      }
    </script>
  </body>
</html>
