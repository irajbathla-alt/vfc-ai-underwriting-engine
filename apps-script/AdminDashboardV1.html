<!doctype html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Georgia,'Times New Roman',serif;margin:0;background:#fff;color:#1d1d1f}.shell{max-width:980px;margin:auto;padding:20px}.hero{text-align:center}.card,.login{border:1px solid #eee;border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 12px 40px rgba(15,23,42,.05)}button,a.btn{border-radius:999px;padding:9px 16px;border:1px solid #cfe0ff;background:#eef5ff;color:#2563eb;text-decoration:none;display:inline-block;cursor:pointer;font:inherit}.primary{background:#3b82f6;color:#fff;border-color:#3b82f6}.green{background:#ecfff6;color:#059669;border-color:#9ee7ca}.muted{color:#777}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}.box{border:1px solid #eee;border-radius:16px;padding:12px}.box span{font-size:12px;color:#888}.box strong{display:block;margin-top:5px}.hidden{display:none}.status{color:#2563eb;text-align:center}@media(max-width:800px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero"><h1>Vancouver<br>Finance Company Inc.</h1><p class="muted">AI Underwriting Engine — V1 Admin</p></section>
    <section id="login" class="login"><h2>Admin Login</h2><label>Password<br><input id="password" type="password"></label><br><br><button class="primary" onclick="login()">Login</button><p id="loginMsg" class="status"></p></section>
    <section id="app" class="hidden"><p><button class="primary" onclick="loadApps()">Refresh Applications</button> <button onclick="logout()">Logout</button></p><p id="msg" class="status">Loading...</p><section id="cards"></section></section>
  </main>
<script>
let token=sessionStorage.getItem('vfcAdminToken')||'',apps=[];window.onload=()=>{if(token)show();};
function login(){set('loginMsg','Checking...');google.script.run.withSuccessHandler(r=>{if(!r.ok){set('loginMsg',r.error||'Login failed');return;}token=r.token;sessionStorage.setItem('vfcAdminToken',token);show();}).withFailureHandler(e=>set('loginMsg',e.message)).adminLogin({password:document.getElementById('password').value});}
function show(){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');loadApps();}
function logout(){token='';sessionStorage.removeItem('vfcAdminToken');document.getElementById('app').classList.add('hidden');document.getElementById('login').classList.remove('hidden');}
function loadApps(){set('msg','Loading applications...');google.script.run.withSuccessHandler(r=>{apps=r.applications||[];render();set('msg',apps.length+' application(s) loaded.');}).withFailureHandler(e=>set('msg',e.message)).listApplicationsAdmin({adminToken:token});}
function render(){const c=document.getElementById('cards');c.innerHTML='';if(!apps.length){c.innerHTML='<div class="card muted">No applications found.</div>';return;}apps.forEach(a=>c.appendChild(card(a)));}
function card(a){const el=document.createElement('article');el.className='card';el.innerHTML='<h2>'+safe(a.businessName||'Unknown Business')+'</h2><p class="muted">'+safe(a.applicationId||'')+' | '+safe(a.status||'Submitted')+'</p><p>Owner: '+safe(a.ownerName||'')+' | Email: '+safe(a.email||'')+'</p><div class="grid"><div class="box"><span>Avg Deposits</span><strong>'+money(a.averageMonthlyDeposits)+'</strong></div><div class="box"><span>Total Deposits</span><strong>'+money(a.totalDeposits)+'</strong></div><div class="box"><span>NSF Count</span><strong>'+safe(a.nsfCount||0)+'</strong></div><div class="box"><span>Risk Grade</span><strong>'+safe(a.aiRiskGrade||'N/A')+'</strong></div></div><p class="muted">'+safe(a.aiUnderwriterNotes||'AI analysis not run yet.')+'</p><p>'+(a.driveFolderUrl?'<a class="btn" target="_blank" href="'+safeAttr(a.driveFolderUrl)+'">Open Drive Folder</a> ':'')+'<button class="green" onclick="runAI(\''+safeAttr(a.applicationId)+'\')">Run AI Analysis</button></p><p id="ai-'+safeAttr(a.applicationId)+'" class="status"></p>';return el;}
function runAI(id){set('ai-'+id,'Reading PDFs and running OpenAI...');google.script.run.withSuccessHandler(r=>{set('ai-'+id,r.ok?'AI complete. Files analyzed: '+r.filesAnalyzed:(r.error||'AI failed'));loadApps();}).withFailureHandler(e=>set('ai-'+id,'Error: '+e.message)).runAnalysisAdmin({adminToken:token,applicationId:id});}
function set(id,t){document.getElementById(id).textContent=t;}function money(v){const n=Number(v||0);return n?'$'+n.toLocaleString():'$0';}function safe(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}function safeAttr(v){return safe(v).replace(/`/g,'&#096;');}
</script>
</body>
</html>
