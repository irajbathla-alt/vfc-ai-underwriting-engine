<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --blue: #1686f7;
      --green: #066b56;
      --soft: #f1f1f1;
      --line: #e0e0e0;
      --muted: #a7a7a7;
      --ink: #171717;
    }

    body {
      margin: 0;
      padding: 30px 18px 60px;
      background: #ffffff;
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin: 18px 0 6px;
      font-size: clamp(38px, 6vw, 66px);
      font-weight: 500;
      letter-spacing: -1.2px;
      line-height: 1.05;
    }

    .subtitle {
      font-size: clamp(22px, 3vw, 34px);
      color: var(--muted);
      margin-bottom: 34px;
    }

    .segment {
      width: min(720px, 94vw);
      margin: 0 auto 26px;
      background: var(--soft);
      border-radius: 54px;
      padding: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      box-sizing: border-box;
    }

    .seg-active, .seg-inactive {
      border-radius: 46px;
      padding: 17px 14px;
      font-size: clamp(27px, 4vw, 42px);
      line-height: 1;
    }

    .seg-active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 10px 22px rgba(22,134,247,.25);
    }

    .seg-inactive {
      color: #555;
    }

    .province-bar {
      width: min(860px, 96vw);
      margin: 0 auto 30px;
      background: var(--soft);
      border-radius: 42px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      padding: 12px 20px;
      box-sizing: border-box;
    }

    .province {
      font-size: clamp(20px, 3vw, 34px);
      color: #4f4f4f;
      padding: 8px 2px;
    }

    .action-row {
      display: flex;
      justify-content: center;
      gap: 22px;
      margin: 8px 0 30px;
      flex-wrap: wrap;
    }

    .pill {
      width: auto;
      border-radius: 34px;
      padding: 16px 42px;
      border: 2px solid #d8e8fb;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(22px, 3vw, 32px);
      background: #f4f8ff;
      color: #1769aa;
      cursor: default;
    }

    .pill.green {
      background: #effff8;
      border-color: #bdeedc;
      color: var(--green);
    }

    .form-card {
      width: min(820px, 96vw);
      margin: 0 auto;
      text-align: left;
      border: 2px solid var(--line);
      border-radius: 28px;
      padding: 26px;
      box-sizing: border-box;
      background: #fff;
      box-shadow: 0 8px 22px rgba(0,0,0,.04);
      font-family: Arial, sans-serif;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: #333;
      margin-bottom: 7px;
    }

    input, select, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .submit {
      width: 100%;
      border: none;
      border-radius: 22px;
      padding: 18px;
      background: var(--blue);
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
    }

    .submit:disabled {
      background: #8bbff2;
      cursor: wait;
    }

    .note {
      text-align: center;
      color: #777;
      font-size: 13px;
      margin-top: 12px;
      font-family: Arial, sans-serif;
    }

    pre {
      white-space: pre-wrap;
      background: #f7f7f7;
      border: 1px solid #eee;
      border-radius: 16px;
      padding: 14px;
      min-height: 52px;
      font-size: 13px;
      overflow-x: auto;
      margin-top: 18px;
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
      .province-bar { grid-template-columns: repeat(4, 1fr); }
      .form-card { padding: 20px; }
      .pill { padding: 13px 26px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Vancouver Finance Company Inc.</h1>
    <div class="subtitle">AI Underwriting Upload Portal</div>

    <div class="segment">
      <div class="seg-active">Merchant Cash</div>
      <div class="seg-inactive">Decision Data</div>
    </div>

    <div class="province-bar">
      <div class="province">BC</div>
      <div class="province">AB</div>
      <div class="province">SK</div>
      <div class="province">MB</div>
      <div class="province">ON</div>
      <div class="province">QC</div>
      <div class="province">ATL</div>
    </div>

    <div class="action-row">
      <div class="pill">Admin Portal</div>
      <div class="pill green">Deal Intake</div>
    </div>

    <div class="form-card">
      <div class="field">
        <label>1. Company Name</label>
        <input id="companyName" placeholder="Example: ABC Pizza Ltd">
      </div>

      <div class="field">
        <label>2. Bank Statements</label>
        <input id="files" type="file" accept="application/pdf" multiple>
      </div>

      <div class="grid">
        <div class="field">
          <label>3. Approved / Declined</label>
          <select id="decision" onchange="toggleDecisionFields()">
            <option value="">Select decision</option>
            <option value="Approved">Approved</option>
            <option value="Declined">Declined</option>
            <option value="Conditional">Conditional</option>
          </select>
        </div>

        <div class="field">
          <label>6. Lender Approved / Reviewed</label>
          <input id="lenderName" placeholder="Example: Journey Capital">
        </div>
      </div>

      <div class="field" id="approvedAmountBox">
        <label>4. If Approved - Amount</label>
        <input id="approvedAmount" placeholder="Example: 25000">
      </div>

      <div class="field" id="declineReasonBox">
        <label>5. If Declined - Reason</label>
        <textarea id="declineReason" placeholder="Example: Too many NSF, low deposits, existing MCA stacking..."></textarea>
      </div>

      <button class="submit" id="submitButton" onclick="submitIntake()">Upload & Save Intake</button>
      <div class="note">Best practice: upload 1–3 PDFs at a time.</div>
      <pre id="result">Ready.</pre>
    </div>
  </div>

<script>
function toggleDecisionFields() {
  const decision = document.getElementById('decision').value;
  document.getElementById('approvedAmountBox').style.display = decision === 'Declined' ? 'none' : 'block';
  document.getElementById('declineReasonBox').style.display = decision === 'Approved' ? 'none' : 'block';
}

toggleDecisionFields();

async function submitIntake() {
  const companyName = document.getElementById('companyName').value.trim();
  const fileInput = document.getElementById('files');
  const decision = document.getElementById('decision').value;
  const lenderName = document.getElementById('lenderName').value.trim();

  if (!companyName) return alert('Please enter company name.');
  if (!fileInput.files.length) return alert('Please upload bank statement PDFs.');

  const button = document.getElementById('submitButton');
  const result = document.getElementById('result');
  button.disabled = true;
  result.innerText = 'Uploading statements and reading bank data...';

  try {
    const files = [];
    for (const file of fileInput.files) {
      const base64 = await toBase64(file);
      files.push({
        name: file.name,
        mimeType: file.type || 'application/pdf',
        base64: base64.split(',')[1]
      });
    }

    google.script.run
      .withSuccessHandler(function(uploadResponse) {
        result.innerText = 'Statements uploaded. Saving decision data...';

        if (!decision && !lenderName) {
          button.disabled = false;
          result.innerText = JSON.stringify(uploadResponse, null, 2);
          return;
        }

        const decisionPayload = {
          companyName: companyName,
          period: uploadResponse.detectedPeriod || '',
          lenderName: lenderName,
          decision: decision,
          approvedAmount: document.getElementById('approvedAmount').value,
          declineReason: document.getElementById('declineReason').value,
          conditions: '',
          paymentFrequency: '',
          paymentAmount: '',
          factorRateOrInterest: '',
          term: '',
          dateSubmitted: '',
          dateDecisionReceived: '',
          notes: 'Saved from simplified VFC intake page.'
        };

        google.script.run
          .withSuccessHandler(function(decisionResponse) {
            button.disabled = false;
            result.innerText = JSON.stringify({
              upload: uploadResponse,
              decision: decisionResponse
            }, null, 2);
          })
          .withFailureHandler(function(error) {
            button.disabled = false;
            result.innerText = 'Upload saved, but decision save failed: ' + error.message;
          })
          .saveLenderDecision(decisionPayload);
      })
      .withFailureHandler(function(error) {
        button.disabled = false;
        result.innerText = 'Error: ' + error.message;
      })
      .uploadStatementBatch(companyName, files);
  } catch (e) {
    button.disabled = false;
    result.innerText = 'Error: ' + e.message;
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}
</script>
</body>
</html>
