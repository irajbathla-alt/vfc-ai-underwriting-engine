<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --blue:#1686f7; --green:#066b56; --soft:#f4f4f4; --line:#e4e4e4; --muted:#969696; --ink:#1f1f1f; }
    body { margin:0; padding:24px 16px 48px; background:#fff; color:var(--ink); font-family:Georgia,'Times New Roman',serif; }
    .wrap { max-width:820px; margin:0 auto; text-align:center; }
    h1 { margin:12px 0 4px; font-size:clamp(30px,4.7vw,48px); font-weight:500; letter-spacing:-.6px; line-height:1.08; }
    .subtitle { font-size:clamp(16px,2.4vw,24px); color:var(--muted); margin-bottom:24px; }
    .segment { width:min(560px,94vw); margin:0 auto 18px; background:var(--soft); border-radius:36px; padding:6px; display:grid; grid-template-columns:1fr 1fr; box-sizing:border-box; }
    .seg-active,.seg-inactive { border-radius:30px; padding:12px 10px; font-size:clamp(18px,2.8vw,26px); line-height:1; }
    .seg-active { background:var(--blue); color:#fff; box-shadow:0 7px 16px rgba(22,134,247,.18); }
    .seg-inactive { color:#555; }
    .province-bar { width:min(680px,96vw); margin:0 auto 18px; background:var(--soft); border-radius:28px; display:grid; grid-template-columns:repeat(7,1fr); padding:8px 14px; box-sizing:border-box; }
    .province { font-size:clamp(14px,2.2vw,22px); color:#555; padding:6px 2px; }
    .action-row { display:flex; justify-content:center; gap:14px; margin:4px 0 22px; flex-wrap:wrap; }
    .pill { border-radius:24px; padding:10px 24px; border:1px solid #d8e8fb; font-size:18px; background:#f4f8ff; color:#1769aa; }
    .pill.green { background:#f1fff8; border-color:#c8efdf; color:var(--green); }
    .form-card { width:min(720px,96vw); margin:0 auto; text-align:left; border:1px solid var(--line); border-radius:22px; padding:22px; box-sizing:border-box; background:#fff; box-shadow:0 8px 20px rgba(0,0,0,.035); font-family:Arial,sans-serif; }
    .field { margin-bottom:15px; }
    label { display:block; font-size:14px; font-weight:700; color:#333; margin-bottom:6px; }
    input,select,textarea { width:100%; box-sizing:border-box; border:1px solid #ddd; border-radius:13px; padding:12px 14px; font-size:15px; outline:none; background:#fff; }
    input:focus,select:focus,textarea:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(22,134,247,.08); }
    textarea { min-height:76px; resize:vertical; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .submit { width:100%; border:none; border-radius:18px; padding:15px; background:var(--blue); color:#fff; font-size:17px; font-weight:700; cursor:pointer; margin-top:4px; }
    .submit:disabled { background:#8bbff2; cursor:wait; }
    .note { text-align:center; color:#777; font-size:12px; margin-top:10px; }
    pre { white-space:pre-wrap; background:#f8f8f8; border:1px solid #eee; border-radius:14px; padding:12px; min-height:46px; font-size:12px; overflow-x:auto; margin-top:16px; }
    @media(max-width:720px){ .grid{grid-template-columns:1fr;} .province-bar{grid-template-columns:repeat(4,1fr);} .form-card{padding:18px;} .pill{padding:9px 20px;font-size:16px;} }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Vancouver Finance Company Inc.</h1>
  <div class="subtitle">AI Underwriting Upload Portal</div>

  <div class="segment">
    <div class="seg-active">Merchant Cash</div>
    <div class="seg-inactive">Training Data</div>
  </div>

  <div class="province-bar">
    <div class="province">BC</div><div class="province">AB</div><div class="province">SK</div>
    <div class="province">MB</div><div class="province">ON</div><div class="province">QC</div><div class="province">ATL</div>
  </div>

  <div class="action-row">
    <div class="pill">Admin Portal</div>
    <div class="pill green">Observed Lender Behaviour</div>
  </div>

  <div class="form-card">
    <div class="field">
      <label>1. Company Name</label>
      <input id="companyName" placeholder="Example: ABC Pizza Ltd" autocomplete="off">
    </div>

    <div class="field">
      <label>2. Bank Statements</label>
      <input id="files" type="file" accept="application/pdf" multiple>
    </div>

    <div class="grid">
      <div class="field">
        <label>3. Approved / Declined</label>
        <select id="decision" onchange="toggleDecisionFields(true)">
          <option value="">Select decision</option>
          <option value="Approved">Approved</option>
          <option value="Declined">Declined</option>
          <option value="Conditional">Conditional</option>
        </select>
      </div>

      <div class="field">
        <label>6. Lender Approved / Reviewed</label>
        <input id="lenderName" placeholder="Example: Journey Capital" autocomplete="off">
      </div>
    </div>

    <div class="field" id="approvedAmountBox">
      <label>4. If Approved - Amount</label>
      <input id="approvedAmount" placeholder="Example: 25000" autocomplete="off">
    </div>

    <div class="field" id="declineReasonBox">
      <label>5. If Declined - Reason</label>
      <textarea id="declineReason" placeholder="Example: Too many NSF, low deposits, existing MCA stacking..."></textarea>
    </div>

    <button class="submit" id="submitButton" onclick="submitIntake()">Upload & Save Training Record</button>
    <div class="note">Best practice: upload 1–3 PDFs at a time.</div>
    <pre id="result">Ready.</pre>
  </div>
</div>

<script>
function toggleDecisionFields(clearOppositeField) {
  const decision = document.getElementById('decision').value;
  const approvedBox = document.getElementById('approvedAmountBox');
  const declineBox = document.getElementById('declineReasonBox');
  const approvedInput = document.getElementById('approvedAmount');
  const declineInput = document.getElementById('declineReason');

  approvedBox.style.display = decision === 'Declined' ? 'none' : 'block';
  declineBox.style.display = decision === 'Approved' ? 'none' : 'block';

  if (clearOppositeField) {
    if (decision === 'Approved') declineInput.value = '';
    if (decision === 'Declined') approvedInput.value = '';
  }
}

toggleDecisionFields(false);

function resetFormAfterSave() {
  document.getElementById('companyName').value = '';
  document.getElementById('files').value = '';
  document.getElementById('decision').value = '';
  document.getElementById('lenderName').value = '';
  document.getElementById('approvedAmount').value = '';
  document.getElementById('declineReason').value = '';
  toggleDecisionFields(false);
}

async function submitIntake() {
  const companyName = document.getElementById('companyName').value.trim();
  const fileInput = document.getElementById('files');
  const decision = document.getElementById('decision').value;
  const lenderName = document.getElementById('lenderName').value.trim();

  if (!companyName) return alert('Please enter company name.');
  if (!fileInput.files.length) return alert('Please upload bank statement PDFs.');

  const approvedAmount = decision === 'Approved' || decision === 'Conditional'
    ? document.getElementById('approvedAmount').value.trim()
    : '';

  const declineReason = decision === 'Declined' || decision === 'Conditional'
    ? document.getElementById('declineReason').value.trim()
    : '';

  const button = document.getElementById('submitButton');
  const result = document.getElementById('result');
  button.disabled = true;
  result.innerText = 'Uploading statements and reading bank data...';

  try {
    const files = [];
    for (const file of fileInput.files) {
      const base64 = await toBase64(file);
      files.push({ name:file.name, mimeType:file.type || 'application/pdf', base64:base64.split(',')[1] });
    }

    google.script.run
      .withSuccessHandler(function(uploadResponse) {
        result.innerText = 'Statements uploaded. Saving observed lender behaviour...';

        if (!decision && !lenderName) {
          button.disabled = false;
          result.innerText = JSON.stringify(uploadResponse, null, 2);
          resetFormAfterSave();
          return;
        }

        const decisionPayload = {
          companyName: companyName,
          period: uploadResponse.detectedPeriod || '',
          lenderName: lenderName,
          decision: decision,
          approvedAmount: approvedAmount,
          declineReason: declineReason,
          notes: decision === 'Approved'
            ? 'Approved outcome saved from VFC intake page.'
            : decision === 'Declined'
              ? 'Declined outcome saved from VFC intake page.'
              : 'Conditional outcome saved from VFC intake page.'
        };

        google.script.run
          .withSuccessHandler(function(decisionResponse) {
            button.disabled = false;
            result.innerText = JSON.stringify({ upload:uploadResponse, trainingRecord:decisionResponse }, null, 2);
            resetFormAfterSave();
          })
          .withFailureHandler(function(error) {
            button.disabled = false;
            result.innerText = 'Upload saved, but training record save failed: ' + error.message;
          })
          .saveLenderDecision(decisionPayload);
      })
      .withFailureHandler(function(error) {
        button.disabled = false;
        result.innerText = 'Error: ' + error.message;
      })
      .uploadStatementBatch(companyName, files);
  } catch (e) {
    button.disabled = false;
    result.innerText = 'Error: ' + e.message;
  }
}

function toBase64(file) {
  return new Promise((resolve,reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}
</script>
</body>
</html>
